schema {
  query: Query
  mutation: Mutation
}

type Query {
  "Average coefficient of performance metrics (COPs) for the entire cosy fleet against external temperature."
  cosyCharacterisation: [CosyCharacterisation!]!
  "The average coefficient of performance (COPs) for the entire cosy fleet historically."
  cosyEfficiency: CosyEfficiency
  "The distribution of seasonal performance factors (SPF) across the Cosy fleet."
  cosyDistribution: [CosyDistribution!]!
  "The median seasonal performance factor (SPF) per region across the Cosy fleet."
  cosyRegional: [CosyRegional!]!
  "The average annual savings for Cosy tariff customers."
  cosySavings: [CosySavings!]!
  "The regional pricing adjustment for the quote."
  quoteRegionalPricing("The quote code." quoteCode: UUID!): QuoteRegionalPricing
  "Get a list of addresses for a given postcode."
  getAddressesForPostcode("The postcode to look up." postcode: GBRPostCode!): [GBRSolarAddress]
  "Aerial data for a property by its UPRN and postcode."
  propertyAerialData("The Unique Property Reference Number (UPRN)." uprn: String! "The postcode of the property (optional)." postcode: String): GeoJsonFeature
  "Get recommended solar panel systems for a property."
  recommendedSystems(input: RecommendedSystemsInput!): RecommendedSystems
  "Fetch data for a device's predicted consumption cycle (for example a washing machine), i.e. a device which is drawing power."
  sherloctopusDevicePredictedConsumptionCycle("The account number for which data is requested." accountNumber: String! "The electricity smart meter device for which data is requested." deviceId: String!): [DevicePredictedConsumptionCycle!]!
  "Fetch actual meaaured consumption data for device (for example a washing machine)."
  sherloctopusDeviceMeasuredConsumption("The account number for which data is requested." accountNumber: String! "The electricity smart meter device for which data is requested." deviceId: String!): DeviceMeasuredConsumption
  "Get retail finance instalments for certain purchase amount."
  retailFinanceInstalmentsTerms("Total amount to calculate instalments for." amount: Float): [InstalmentMonthlyTerm]
  "Generate an breakdown example of an instalment plan"
  retailFinanceRepresentativeExample: RepresentativeExample
  "Query product eligibility against all potentially eligible enrollment candidates for the given property and account."
  productEnrollmentCandidatesEligibility("The account number for which info is requested." accountNumber: String! "Kraken Property ID to get enrollment candidates from." krakenPropertyId: Int! "Specifies which product is used when searching for the option." productLine: String! "An option within the product line. Leaving this empty selects the first available option." productLineOption: String): ProductEligibilityForGeneratedCandidates
  "Query vehicle eligibility for IO Go smart product by providing registration number."
  vehicleEligibilityForIoGo("Vehicle registration number." registrationNumber: String!): VehicleEligibilityForIOGo
  "Returns all available smart product line options with their latest Kraken product codes."
  smartProductLineOptions: [SmartProductLineOption]!
  "The meter point."
  meterPoint("The meter point MPXN." mpxn: String! "The meter point fuel type." fuelType: FuelType!): MeterPoint
  "Retrieve an Ink live chat conversation by account number and optional conversation relay ID."
  inkConversation("The account number to retrieve conversations for." accountNumber: String! "The conversation relay ID to retrieve" conversationRelayId: String): InkConversation
  "Get account EV charge history during Greener Nights."
  greenerNightsAccountEvChargeHistory("The account number for which data is requested." accountNumber: String! "Start date for the data retrieval period." dateFrom: Date! "End date for the data retrieval period." dateTo: Date!): [AccountEVChargeHistory]
  greenerNightsAccountStats("The account number for which data is requested." accountNumber: String!): GreenerNightsAccountStats
  "Get upcoming week Greener Nights forecast"
  greenerNightsForecast: [GreenerNightsForecast]
  "Get an estimate of the number of kWh an average domestic solar installation would produce for a given postcode."
  solarGenerationEstimate("The postcode area to fetch estimate for." postcode: String! "The start date from which to pull a weeks worth of data." fromDate: Date! before: String after: String first: Int last: Int): SolarGenerationEstimateConnection
  "Summary of an account's participation in Free Electricity across all events."
  freeElectricityAccountSummary("The account number to get the summary for." accountNumber: String!): FreeElectricityAccountSummary
  "List of Free Electricity events that an account participated in."
  freeElectricityAccountEvents("The account number to get the events for." accountNumber: String! "Start datetime filter." startDate: DateTime "End datetime filter." endDate: DateTime before: String after: String first: Int last: Int): FreeElectricityAccountEventConnection
  "Collective statistics for the Free Electricity campaign."
  freeElectricityCollectiveStats: FreeElectricityCollectiveStats
  evChargerPartnershipOffer("The code of the offer for which data is requested." offerCode: String!): EvChargerPartnershipOffer
  "Search for address UPRNs matching the provided postcode."
  addressUprns("The postcode to search for." postcode: String! "Filter to electricity-only addresses if True." electricityOnly: Boolean): [AddressUprn]
  "Retrieve the supply point metadata for the given account number and external identifier."
  supplyPointMetaData("The account number of the supply point." accountNumber: String! "The external identifier of the supply point." externalIdentifier: String!): SupplyPointMetaData
  "Get sessions for a Flexibility Scheme that the member is enrolled in."
  flexibilitySchemeSessions("The Flexibility Scheme slug" schemeSlug: NonEmptyString! "The details of the scheme member." member: FlexibilitySchemeMember! before: String after: String first: Int last: Int): FlexibilitySchemeSessionConnection!
  "Renewable Energy Community stats, details and consumption data for an account (if they're a REC member)."
  renewableEnergyCommunity(accountNumber: String!): RenewableEnergyCommunityMember
  "Get the details of a basic Scheme."
  scheme(slug: String!): Scheme!
  "Get the scheme membership details for a member."
  schemeMembership(slug: String! "The details of the scheme member." member: SchemeMember!): [SchemeMembership!]
  "Check if a member candidate is eligible for the scheme at the time of the request."
  isEligibleForScheme(slug: String! "The details of the member candidate." member: SchemeMember!): Eligibility!
  "Show the account's charity donation amount choices."
  charityDonationAmountChoices: CharityDonationAmountChoices
  "Show the account's charity donation records, and the total amount donated."
  charityDonationHistory("Account number." accountNumber: String!): CharityDonationHistory
  "Show the account's charity donation settings."
  charityDonationSettings("Account number." accountNumber: String!): CharityDonationSettings
  "The device-specific credentials registered with the Kraken platform. This field does not include OCCP server related credentials."
  octoChargerDeviceCredentials("The device UUID of the device." deviceUUID: ID!): ElectricChargerDeviceCredentials
  "The charge-point-schedules associated with the device"
  chargePointSchedules("The device UUID of the device." deviceUUID: UUID! "The account number of the device." accountNumber: String!): ChargePointSchedules!
  "The charge points related to an account in a specific location."
  chargePointsAtLocation("The account number to find the charge points for." accountNumber: String! "The property ID to find the charge points for." propertyId: String): ChargePointsAtLocation!
  "The firmware version state of the charge point."
  chargePointFirmwareVersionState("The device UUID of the device." deviceUUID: UUID! "The account number of the device." accountNumber: NonEmptyString!): ChargePointFirmwareVersionState!
  "The history of charging sessions associated with the charger."
  chargingSessions("The account number of the device." accountNumber: NonEmptyString! "The device UUID of the device." deviceUUID: UUID! "Only charging sessions after this time are returned. Must be a UTC timestamp." after: DateTime! "Only charging sessions after this time are returned. Must be a UTC timestamp, and form a period of less than 12 months total." before: DateTime! first: Int last: Int): ElectricChargerChargingSessionConnection!
  wheelOfFortuneSegments("Account number" accountNumber: String!): [WheelOfFortunePrize]
  wheelOfFortuneSpinsAllowed("Meter's fuel type" fuelType: FuelType! "Account number" accountNumber: String!): WheelOfFortuneSpinsAllowed
  wheelOfFortunePrizeType("Account number" accountNumber: String!): WheelOfFortunePrizeType
  wheelOfFortuneSpinHistory("Account number" accountNumber: String! "Meter's fuel type" fuelType: FuelType "Date from which to fetch the spin history. Defaults to one month ago." dateFrom: Date "Date to which to fetch the spin history. Defaults to now." dateTo: Date before: String after: String first: Int last: Int): WheelOfFortuneSpinConnection
  "Total number of prizes won so far in the current period"
  wheelOfFortunePrizesWon: Int
  "Saving sessions queries for an account."
  savingSessions: SavingSessionsType
  "Octoplus Offer Groups available for a given account_user and account combination."
  octoplusOfferGroups("Account number for the Octoplus-enrolled account." accountNumber: String! "ID of the Offer Group being queried." id: Int before: String after: String first: Int last: Int): OctoplusOfferGroupConnectionTypeConnection
  "Octoplus Offer available for a given account_user and account combination."
  octoplusOffer("Slug of the offer" slug: String! "Account number for the Octoplus-enrolled account." accountNumber: String!): OctoplusOfferType
  "Octoplus Rewards for a given account user."
  octoplusRewards("Id for the reward being queried." rewardId: Int "Account number for the Octoplus-enrolled account." accountNumber: String! "Slug of the offer being queried." offerSlug: String): [OctoplusRewardType]
  "Describes availability of Shoptopus Vouchers for given Octopoint amounts."
  shoptopusVoucherAvailability("The values (in Octopoints) for which to return voucher availability (maximum 5 values)." voucherValues: [Int]! "Account number for the Octoplus-enrolled account." accountNumber: String!): [ShoptopusVoucherAvailabilityType]
  "The currently active charity partnership. Returns null if there are currently no active partnerships."
  octoplusActiveCharityPartnership: CharityPartnershipDisplayData
  "The donations a user has previously made to charity partnerships"
  octoplusCharityDonations("The order the charities should be returned in" orderBy: CharityDonationOrderBy! "Filters to donations made from a certain account (if passed)." accountNumber: String! "Filters to donations made towards a particular partnership (if passed)." partnershipExternalReference: UUID before: String after: String first: Int last: Int): CharityDonationConnection!
  "Get mobile screen details to render."
  backendScreen("The ID of the screen to return." screenId: ID! "List of key-value pairs (strings) to pass as parameters to the screen." params: [BackendScreenParamInputType] "The maximum version of backend screens supported by the client.                 This can be used to fall back to older versions of screens or features." maxVersionSupported: Int = 1): GenericBackendScreen
  "Get a dashboard screen to render."
  dashboardScreen("The ID of the dashboard type screen to return." dashboardId: ID! "The account number of the user." accountNumber: String! "The maximum version of dashboard type screens supported by the client." maxVersionSupported: Int! = 1 "The ledger id associated to the account." ledgerId: String "The ledger number associated to the account." ledgerNumber: String "The property id associated to the account." propertyId: String "List of key-value pairs (strings) to pass as parameters to the screen." params: [BackendScreenParamInputType]): Dashboard
  "Get all registered backend screen IDs."
  backendScreenIds: [String]
  "Get all registered backend screen event IDs."
  backendScreenEventIds: [String]
  "The heat pump quote which was given to the customer."
  heatPumpQuote("The heat pump quote code." code: UUID!): HeatPumpQuote
  "The heat pump finance offer which was selected by the customer for the given quote."
  heatPumpQuoteFinanceOffer("The heat pump quote code." code: UUID!): HeatPumpQuoteFinanceOffer
  "Retrieve the heat pump controller device status."
  heatPumpControllerStatus("The account number associated with the heat pump." accountNumber: String! "The EUID of the heat pump controller." euid: ID!): ControllerStatus
  "The heat pump controllers attached to an account at a given location."
  heatPumpControllersAtLocation(accountNumber: String! propertyId: ID!): [ControllerAtLocation]
  "The configuration of the heat pump controller and its zones."
  heatPumpControllerConfiguration("The account number associated with the heat pump controller." accountNumber: String! "The EUID of the heat pump controller." euid: ID!): ControllerAndZoneConfiguration
  "Heat pump performance data between two specific dates."
  heatPumpTimeRangedPerformance("The account number associated with the heat pump." accountNumber: String! "The EUID of the heat pump controller." euid: ID! startAt: DateTime! endAt: DateTime!): HeatPumpTimeRangedPerformance
  "Heat pump performance time series data."
  heatPumpTimeSeriesPerformance("The account number associated with the heat pump controller." accountNumber: String! "The EUID of the heat pump controller." euid: ID! "Start datetime for the time series." startAt: DateTime! "End datetime for the time series." endAt: DateTime! "Grouping interval for the time series." performanceGrouping: PerformanceGrouping!): [HeatPumpPerformanceGroupingNode]
  "Heat pump lifetime performance data."
  heatPumpLifetimePerformance("The account number associated with the heat pump controller." accountNumber: String! "The EUID of the heat pump controller." euid: ID!): LifetimeTelemetry
  "Latest telemetry values from the heat pump."
  heatPumpLivePerformance("The account number associated with the heat pump controller." accountNumber: String! "The EUID of the heat pump controller." euid: ID!): LiveTelemetry
  "Get aggregate summary of customer payouts (total balance and count)."
  customerPayoutsSummary("The Kraken account number." accountNumber: String!): CustomerPayoutsSummaryType
  "Retrieve all customer payouts for a given account number."
  customerPayouts("The Kraken account number." accountNumber: String!): [CustomerPayoutType]
  "Checks whether the specified potential customer should be allowed to sign up with us."
  signupEligibility(input: SignupEligibilityInput!): SignupEligibility
  "The available Kraken Field appointment slots for a given search ID. If Kraken Field has not returned results yet, this endpoint returns an empty list."
  availableFieldAppointmentSlots("The search ID." searchId: UUID! "The appointment booking token." bookingToken: UUID): [AppointmentSlotType]
  "Get the field appointment for a booking token."
  fieldAppointment("The appointment booking token." bookingToken: UUID!): FieldAppointment
  "Charging streak data for the requested account."
  chargingStreaks("Kraken Customer account number." accountNumber: String!): ChargingStreaksType
  account(accountNumber: String!): AccountType
  "Get a list of pending account health tasks for this account."
  accountHealthChecklist("The Kraken account number." accountNumber: String!): AccountHealthChecklist
  version: String
}

type CosyCharacterisation {
  "The readings directly from the heatpumps themselves."
  averageExternalTemperature: Int!
  "The level of efficiency at that temperature."
  medianCop: Float!
}

type CosyEfficiency {
  "The average coefficient of performance over the last 30 days. (used for measuring how efficient the device is for transferring energy to heat)."
  averageCop30Day: Float!
  "The average coefficient of performance over the last 90 days. (used for measuring how efficient the device is for transferring energy to heat)."
  averageCop90Day: Float!
  "The average coefficient of performance over the devices whole lifespan (to show how efficient its been overall)"
  averageSpf: Float!
}

type CosyDistribution {
  "The seasonal performance factor for a device."
  deviceSpf: Float!
  "The percentage of the total fleet with this SPF."
  devicePercentage: Float!
}

type CosyRegional {
  "The low carbon technology (LCT) region identifier."
  lctRegion: String!
  "The median seasonal performance factor (SPF) for this region."
  medianSpf: Float!
  "The average annual savings for customers in this region."
  averageAnnualSavings: Float
}

type CosySavings {
  "The tariff type."
  tariffType: String!
  "The average annual savings for this tariff type."
  averageAnnualSavings: Float!
}

"The Quote's regional pricing."
type QuoteRegionalPricing {
  "The quote code."
  quoteCode: UUID!
  "The region_id for the adjustment."
  regionId: String!
  "The multiplier adjustment (e.g., 0.5 for half-price)."
  multiplierAdjustment: Decimal
  "The flat adjustment in pence (e.g., -2000 for 20 pound discount, 3000 for 30 pound increase)."
  flatAdjustment: Int
}

"Leverages the internal Python implementation of UUID (uuid.UUID) to provide native UUID objects\nin fields, resolvers and input."
scalar UUID

"The `Decimal` scalar type represents a python Decimal."
scalar Decimal

"An address."
type GBRSolarAddress {
  "A single-line address representation combining available address components."
  addressLine: String!
  "Address postcode."
  postcode: GBRPostCode!
  "The Unique Property Reference Number (UPRN) for the address."
  uprn: String!
  "The type of property."
  propertyType: SolarAddressPropertyType
  "The geographic coordinates (latitude and longitude) of the address."
  coordinates: CoordinatesOutput
}

"A postcode in GBR format."
scalar GBRPostCode

"An enumeration."
enum SolarAddressPropertyType {
  HOUSE
  FLAT
  OTHER
}

"A geographic location on Earth's surface."
type CoordinatesOutput {
  latitude: Float!
  longitude: Float!
}

type GeoJsonFeature {
  "Human-readable ID for what the feature represents."
  id: String!
  "The feature type (always 'Feature')."
  type: String!
  "The geometry of the feature."
  geometry: GeoJsonGeometry!
  "Additional properties of the feature."
  properties: JSONString
}

type GeoJsonGeometry {
  "The geometry type (e.g., Polygon, MultiPolygon)."
  type: String!
  "The coordinates defining the geometry. Format varies by type: Polygon uses [[[lon, lat], ...]] and MultiPolygon uses [[[[lon, lat], ...]], ...]"
  coordinates: JSONString!
}

"Allows use of a JSON String for input \/ output from the GraphQL schema.\n\nUse of this type is *not recommended* as you lose the benefits of having a defined, static\nschema (one of the key benefits of GraphQL)."
scalar JSONString

type RecommendedSystems {
  "Is the property suitable for solar?"
  suitable: Boolean!
  "Reason for suitability or lack thereof."
  suitabilityReason: String!
  "List of recommended solar systems."
  systems: [SolarSystem]!
}

type SolarSystem {
  "Unique system identifier."
  systemId: String!
  "System description."
  description: String!
  "Number of panels in the system."
  numberOfPanels: Int!
  "Confidence score for recommendation."
  confidence: Float!
  "Battery details for the system."
  battery: Battery
  "Estimated annual savings."
  annualSavings: Float!
  "Estimated payback period in years."
  paybackYears: Float!
  "Comparable interest rate."
  comparableInterestRate: Float!
  "Self-consumption metrics."
  selfConsumption: SelfConsumption!
  "Estimated export income."
  exportIncome: Float!
  "Total installation cost."
  installCostTotal: Float!
  "Breakdown of installation costs."
  installCostBreakdown: CostBreakdown
  "List of solar arrays."
  solarArrays: [SolarArrayGeoJsonFeatureCollection]!
}

type Battery {
  "Battery size in kWh."
  sizeKwh: Float!
  "Human-readable battery size."
  sizeString: String!
  "Battery manufacturer."
  manufacturer: BatteryManufacturer!
}

"Battery manufacturers supported."
enum BatteryManufacturer {
  FOX
  DURACELL
  TESLA
  ENPHASE
}

"Self-consumption metrics.\n\nWhen a household uses the energy it generates rather than exporting it to the grid.\n- savings: Annual savings in GBP from using self-consumed energy instead of grid energy.\n- percentage: Percentage of generated energy that is self-consumed."
type SelfConsumption {
  "Annual savings from using self-consumed energy in GBP."
  savingsGbp: Float!
  "Percentage of solar energy self-consumed."
  percentage: Float!
}

type CostBreakdown {
  "Materials cost."
  materials: Float!
  "Labour cost."
  labour: Float!
  "Scaffolding cost."
  scaffolding: Float!
  "Other costs."
  other: Float!
}

type SolarArrayGeoJsonFeatureCollection {
  "The type of GeoJSON object (always 'FeatureCollection')."
  type: String!
  "List of GeoJSON features."
  features: [PanelGeoJsonFeature]!
  "Properties for the solar array."
  arrayData: SolarArrayData
}

type PanelGeoJsonFeature {
  "Human-readable ID for what the feature represents."
  id: String!
  "The feature type (always 'Feature')."
  type: String!
  "The geometry of the feature."
  geometry: GeoJsonGeometry!
  "Additional properties of the feature."
  properties: PanelFeatureProperties
}

type PanelFeatureProperties {
  "Indicates if the panel is active."
  active: Boolean
  "The orientation of the solar panel."
  orientation: PanelOrientation
  "The shading factor affecting the panel."
  shadingFactor: Float
  "The annual energy output in kWh."
  annualOutputKwh: Float
  "The scaffoldability level for installation."
  scaffoldability: Scaffoldability
  "The shading point coordinates."
  shadingPoint: [Float]
}

"An enumeration."
enum PanelOrientation {
  PORTRAIT
  LANDSCAPE
}

"Level of difficulty for scaffolding installation."
enum Scaffoldability {
  EASY
  HARD
  IMPOSSIBLE
}

type SolarArrayData {
  "Index of the solar array."
  arrayIndex: Int
  "Number of panels in the solar array."
  panelCount: Int
}

"All parameters required to get recommended solar panel systems for a property."
input RecommendedSystemsInput {
  "The Unique Property Reference Number (UPRN)."
  uprn: NonEmptyString!
  "The postcode of the property."
  postcode: GBRPostCode!
  "The Property's annual electricity usage in kWh."
  annualUsageKwh: Float
  "The occupancy archetype of the property."
  occupancyArchetype: OccupancyArchetype
}

"Non-empty string."
scalar NonEmptyString

"An enumeration."
enum OccupancyArchetype {
  HOME_ALL_DAY
  IN_HALF_THE_DAY
  OUT_ALL_DAY
}

"Data for a device consumption cycle (for example a washing machine), i.e. a device which is drawing power."
type DevicePredictedConsumptionCycle {
  "Identifier for a washing machine cycle (I.e. device is drawing power)."
  cycleId: Int
  "When the cycle starts."
  startAt: DateTime
  "When the cycle end."
  endAt: DateTime
  "How long the cycle lasted in mins."
  lengthMinutes: Int
  "Predicted energy consumption over the cycle in kWh."
  consumptionKwh: Float
  "Max power in the cycle in kW."
  maxPowerKw: Float
  "If the prediction was correct or not, returns NULL if not yet confirmed."
  successfulPrediction: Boolean
}

"The `DateTime` scalar type represents a DateTime\nvalue as specified by\n[iso8601](https:\/\/en.wikipedia.org\/wiki\/ISO_8601)."
scalar DateTime

type DeviceMeasuredConsumption {
  "Half hourly measured consumption data for home load and washing machine."
  halfHourly: [DeviceHalfHourlyMeasuredConsumption!]!
  "Daily measured consumption data for home load and washing machine."
  daily: [DeviceDailyMeasuredConsumption!]!
}

"Half hourly measured Data for a device measured consumption."
type DeviceHalfHourlyMeasuredConsumption {
  "When the measurement starts."
  startAt: DateTime
  "When the week of the measurement began."
  weekStart: DateTime
  "Energy consumption over the cycle in kWh."
  homeLoadKwh: Float
  "The consumet in kW"
  washingMachineKwh: Float
}

"Half hourly measured Data for a device measured consumption."
type DeviceDailyMeasuredConsumption {
  "When the measurement starts."
  startAt: DateTime
  "When the week of the measurement began."
  weekStart: DateTime
  "Energy consumption over the period in kWh."
  homeLoadKwh: Float
  "The consumption in kW"
  washingMachineKwh: Float
}

type InstalmentMonthlyTerm {
  "Instalment type."
  type: String
  "Is instalment plan available."
  isAvailable: Boolean
  "Amount of months in the term."
  monthsInTerm: Int
  "Interest rate."
  interestRate: Float
  "Minimum amount to spend."
  minimumSpend: Int
  "Maximum amount to spend."
  maximumSpend: Int
  "Cost for the first instalment."
  firstInstalmentCost: Float
  "Cost for the regular instalment."
  regularInstalmentCost: Float
  "Cost for the final instalment."
  finalInstalmentCost: Float
  "Total amount loaned."
  totalLoanValue: Float
  "Total amount to pay."
  totalToPay: Float
  "Total interest to pay."
  totalInterest: Float
}

type RepresentativeExample {
  "Total amount to pay."
  amount: Float
  "Amount of months in the term."
  monthsInTerm: Int
  "Interest rate."
  interestRate: Float
  "HTML-type instalment breakdown."
  description: String
}

type ProductEligibilityForGeneratedCandidates {
  "Indicates if at least one candidate is eligible for the product."
  isEligible: Boolean!
  "The product line used to determine the eligibility of candidates (if any)."
  productLine: String!
  "The specific option within the selected product line, if available."
  productLineOption: String
  "All ineligibility reasons that apply to one or more candidates."
  ineligibilityReasons: [ProductIneligibilityReasonDetails]
  "The list of generated candidates."
  candidates: [ProductEnrollmentCandidate]
}

type ProductIneligibilityReasonDetails {
  "The code identifying the ineligibility reason."
  code: String!
  "A human-readable description of the ineligibility reason."
  description: String!
  "The type of the ineligibility reason."
  type: IneligibilityReasonType!
  "IDs of candidates affected by this ineligibility reason, if applicable."
  candidateIds: [Int]
}

"\n    Which type ineligibility reason belongs to.\n    "
enum IneligibilityReasonType {
  ACCOUNT
  CANDIDATE
}

type ProductEnrollmentCandidate {
  "Unique identifier of the candidate, referenced in ineligibility reasons."
  id: Int!
  "The type of the candidate."
  type: ProductEnrollmentCandidateType!
  "Indicates whether the candidate is eligible for the product."
  isEligible: Boolean!
  "Import MPAN for electricity."
  importMpan: String
  "Export MPAN for electricity."
  exportMpan: String
  "MPRN for gas."
  gasMprn: String
}

"\n    Which type product enrollment candidate belongs to.\n    "
enum ProductEnrollmentCandidateType {
  IMPORT_ELECTRICITY
  EXPORT_ELECTRICITY
  DUAL_DIRECTION_ELECTRICITY
  GAS
}

type VehicleEligibilityForIOGo {
  "Whether the vehicle is eligible."
  isEligible: Boolean!
}

type SmartProductLineOption {
  "The product line identifier."
  line: String!
  "The option within the product line."
  option: String
  "The latest Kraken product code for import electricity."
  importProductCode: String
  "The latest Kraken product code for export electricity."
  exportProductCode: String
  "The latest Kraken product code for gas."
  gasProductCode: String
}

type MeterPoint {
  "The supply status of this meter point."
  supplyStatus: SupplyStatus!
  "The date the previous tenant moved out and the account associated with the meter point became an occupier account, if the meter point has a supply status of OCCUPIER."
  occupierFrom: Date
}

enum SupplyStatus {
  SUPPLIED_BY_OE
  WITH_OTHER_SUPPLIER
  OCCUPIER
  ON_HOLD
  UNHANDLED
}

"The `Date` scalar type represents a Date\nvalue as specified by\n[iso8601](https:\/\/en.wikipedia.org\/wiki\/ISO_8601)."
scalar Date

enum FuelType {
  ELECTRICITY
  GAS
}

type InkConversation {
  "The unique identifier for the conversation"
  id: String
  "The status of the conversation"
  status: String
  "The list of buckets"
  buckets: [InkBucket]
  "The events in the conversation"
  events("The number of events to retrieve" last: Int): InkEventEdge
}

type InkBucket {
  "The name of the bucket"
  name: String
  "The unique identifier for the bucket"
  id: String
  "The icon for the bucket"
  icon: String
}

type InkEventEdge {
  "The list of event edges"
  edges: [InkEventNode]
}

type InkEventNode {
  "The event node"
  node: InkNewMessage
}

type InkNewMessage {
  "The live chat message"
