"Look up an *event* (button tap, etc.) that the mobile client wants to\nperform in the backend, and return the next Action for the mobile client.\n\nThe possible errors that can be raised are:\n- OE-1201: Action not implemented.\n- OE-1202: Backend screen event execution failed.\n"
type BackendScreenEvent {
  "The next action the client should perform."
  action: ActionType
}

"Any Action that can be produced by `backendScreenEvent`."
union ActionType = ScreenActionType | LinkActionType | DeeplinkActionType | BackendScreenEventActionType | CloseActionType | GenericAction

"Tells the client to replace the current view with another back-end\nscreen.\nThis should cause a subsequent query to `backendScreen` with the\nscreen_id and specified parameters."
type ScreenActionType implements ActionInterface {
  "Unqiue identifier of the action."
  id: ID
  "The name of the action object's type."
  typeName: String
  "The ID of the screen the client should load next."
  screenId: ID!
  "Optional parameters that must be forwarded when the client subsequently queries `backendScreen`."
  params: [BackendScreenParamType!]
  "If False, the client must not allow a user-initiated navigation back to the previous screen."
  allowBack: Boolean
}

"Actions are events created by buttons and other interaction."
interface ActionInterface {
  "Unqiue identifier of the action."
  id: ID
  "The name of the action object's type."
  typeName: String
}

"A key\/value pair that is returned to the client as part of an Action."
type BackendScreenParamType {
  key: String!
  value: String!
}

"An action which tells the mobile client to navigate to any URL."
type LinkActionType implements ActionInterface {
  "Unqiue identifier of the action."
  id: ID
  "The name of the action object's type."
  typeName: String
  "The URL to navigate to."
  url: String!
}

"An action which tells the mobile client to navigate to another screen.\n(Not necessarily a backend screen.)"
type DeeplinkActionType implements ActionInterface {
  "Unqiue identifier of the action."
  id: ID
  "The name of the action object's type."
  typeName: String
  "The URL to navigate to."
  url: String!
}

"An action which triggers another event in the OE backend.\nThis is the primary way by which a mobile client can interact with,\nand make changes in, the backend."
type BackendScreenEventActionType implements ActionInterface {
  "Unqiue identifier of the action."
  id: ID
  "The name of the action object's type."
  typeName: String
  "The ID of the event to trigger."
  eventId: ID!
  "List of key-value pairs to pass as parameters to the event."
  params: [BackendScreenParamType!]
}

"Closes the screen."
type CloseActionType implements ActionInterface {
  "Unqiue identifier of the action."
  id: ID
  "The name of the action object's type."
  typeName: String
}

type GenericAction implements ActionInterface {
  "Unqiue identifier of the action."
  id: ID
  "The name of the action object's type."
  typeName: String
}

"Input for a backend screen event."
input BackendScreenEventInput {
  "The ID of the event to perform."
  eventId: ID!
  "List of key-value pairs (strings) to pass as parameters to the mutation."
  params: [BackendScreenParamInputType]
}

