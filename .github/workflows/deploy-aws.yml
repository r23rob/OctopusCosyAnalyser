name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2

jobs:
  deploy:
    name: Build, migrate, deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Build SPA ─────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: octopus-cosy-web/package-lock.json

      - name: Build React frontend
        run: npm ci && npm run build
        working-directory: octopus-cosy-web

      # ── AWS auth (OIDC) ──────────────────────────────────────────────────
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── CDK deploy (builds Docker image + creates/updates infrastructure) ─
      - uses: docker/setup-qemu-action@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install CDK dependencies
        run: npm ci
        working-directory: infra/aws

      - name: CDK deploy
        run: npx cdk deploy --require-approval never --outputs-file cdk-outputs.json
        working-directory: infra/aws
        env:
          NEON_CONNECTION_STRING: ${{ secrets.NEON_CONNECTION_STRING }}
          OCTOPUS_ACCOUNT_NUMBER: ${{ secrets.OCTOPUS_ACCOUNT_NUMBER }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_EUID: ${{ secrets.OCTOPUS_EUID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Extract CDK outputs
        id: outputs
        run: |
          BUCKET=$(jq -r '.CosydaysStack.WebBucketName' infra/aws/cdk-outputs.json)
          DIST_ID=$(jq -r '.CosydaysStack.DistributionId' infra/aws/cdk-outputs.json)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "dist_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      # ── EF Core migrations ───────────────────────────────────────────────
      - name: Run database migrations
        run: |
          dotnet tool restore
          dotnet ef database update --project OctopusCosyAnalyser.ApiService
        env:
          ConnectionStrings__cosydb: ${{ secrets.NEON_CONNECTION_STRING }}

      # ── Sync SPA to S3 ───────────────────────────────────────────────────
      - name: Upload SPA to S3
        run: |
          BUCKET="${{ steps.outputs.outputs.bucket }}"

          # Fingerprinted assets — immutable, long cache
          aws s3 sync octopus-cosy-web/dist/assets "s3://$BUCKET/assets" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          # PWA files that must revalidate every load
          for f in index.html sw.js manifest.webmanifest registerSW.js; do
            [ -f "octopus-cosy-web/dist/$f" ] && \
            aws s3 cp "octopus-cosy-web/dist/$f" "s3://$BUCKET/$f" \
              --cache-control "no-cache, no-store"
          done

          # Remaining static files (icons, fonts, etc.)
          aws s3 sync octopus-cosy-web/dist "s3://$BUCKET" \
            --cache-control "public, max-age=86400" \
            --exclude "assets/*" \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "manifest.webmanifest" \
            --exclude "registerSW.js"

      # ── CloudFront invalidation ───────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.dist_id }}" \
            --paths "/index.html" "/sw.js" "/manifest.webmanifest"
