name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME is owner/repo in lower-case, e.g. r23rob/octopuscosyanalyser
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push multi-platform images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── React frontend type-check + build ────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: octopus-cosy-web/package-lock.json

      - name: Install React frontend dependencies
        run: npm ci
        working-directory: octopus-cosy-web

      - name: Build React frontend (type-check + bundle)
        run: npm run build
        working-directory: octopus-cosy-web

      # QEMU lets the builder emulate ARM on the GitHub-hosted x86 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in when we are going to push (not on PRs from forks)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── API service ──────────────────────────────────────────────────────

      - name: Extract metadata for API service image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/apiservice
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push API service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./OctopusCosyAnalyser.ApiService/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Web frontend (React + nginx) ─────────────────────────────────────

      - name: Extract metadata for Web frontend image
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/webfrontend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push Web frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./octopus-cosy-web
          file: ./octopus-cosy-web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SHA tag for Azure deploy step ─────────────────────────────────────
      - name: Compute short SHA tag
        if: github.event_name == 'push'
        id: sha
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  # ── Deploy to Azure Container Apps ─────────────────────────────────────────
  # Only runs on push to main/master, after the build job succeeded.
  # Uses OIDC federated credentials — no client secret stored as a GitHub secret.
  # Pre-requisite (one-time): create an Azure App Registration with a federated
  # credential bound to this repo + branch, and set repo secrets:
  #   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
  # plus the resource-group/app-name vars below.
  deploy-azure:
    name: Deploy to Azure Container Apps
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    permissions:
      id-token: write       # required for OIDC federated auth to Azure
      contents: read

    steps:
      - name: Compute image tag
        id: tag
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update API Container App image
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_API_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "ghcr.io/${{ env.IMAGE_NAME }}/apiservice:${{ steps.tag.outputs.image_tag }}" \
            --output table

      - name: Update worker Jobs (snapshot, timeseries, cost, intervals)
        run: |
          for JOB in \
              "${{ vars.AZURE_JOB_SNAPSHOT_NAME }}" \
              "${{ vars.AZURE_JOB_TIMESERIES_NAME }}" \
              "${{ vars.AZURE_JOB_COST_NAME }}" \
              "${{ vars.AZURE_JOB_INTERVALS_NAME }}"; do
            az containerapp job update \
              --name "$JOB" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --image "ghcr.io/${{ env.IMAGE_NAME }}/apiservice:${{ steps.tag.outputs.image_tag }}" \
              --output table
          done

      - name: Build SPA bundle for static hosting
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: octopus-cosy-web/package-lock.json

      - name: Checkout (needed for SPA build)
        uses: actions/checkout@v4

      - name: Install + build SPA
        run: |
          npm ci
          npm run build
        working-directory: octopus-cosy-web

      - name: Upload SPA bundle to Azure Storage $web
        run: |
          az storage blob upload-batch \
            --account-name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
            --auth-mode login \
            --source octopus-cosy-web/dist \
            --destination '$web' \
            --overwrite
