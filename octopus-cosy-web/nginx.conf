server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all client-side routes render index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API calls to the backend apiservice container
    location /api/ {
        proxy_pass http://apiservice:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # AI analysis can take several minutes
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # Health check for Docker/Aspire
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # Cache static assets aggressively (Vite fingerprints them)
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
